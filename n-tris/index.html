<!DOCTYPE html>
<html>

	<head>
		<title>N-tris</title>
		<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" />
		<script src="main.js" charset="utf-8"></script>
		<style>
			body {
				font-family: "Lato", sans-serif;
				background-color: #eff;
				color: black;
			}

			.pieces-table {
				background-color: #dfd;
				margin-left: 22px;
				margin-bottom: 12px;
				margin-top: 4px;
				padding: 4px;
			}

			.pieces-table td {
				height: 16px;
				width: 16px;
				border-radius: 4px;
			}

			button {
				cursor: pointer;
				background-color: #4d0;
				border-radius: 6px;
				width: 100px;
				margin-left: 6px;
				margin-right: 6px;
			}

			button:hover {
				font-weight: bold;
			}

			#n-field {
				width: 40px;
			}

			.pieces-header {
				background-color: #4d0;
				padding: 4px;
				font-weight: bold;
			}

			#spinner {
				height: 36px;
			}

			.hidden {
				display: none;
			}

		</style>
	</head>

	<body onLoad="load();">
		Enter n: <input id="n-field" type="text" value="4" />

		<button id="go-button" onClick="generatePiecesTable()">Go</button>
		<span id="spinner" class="hidden">WORKING...</span>
		<!-- <button onClick="rotatePiece(testPiece); renderPiece(testPiece);">Go</button> -->
		<hr />
		<div id="pieces-table-container"> </div>
	</body>

</html>
