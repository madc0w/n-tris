<!DOCTYPE html>
<html>

	<head>
		<title>N-tris</title>
		<link href="https://fonts.googleapis.com/css?family=Lato" rel="stylesheet" />
		<script src="utils.js" charset="utf-8"></script>
		<script src="pieces.js" charset="utf-8"></script>
		<script src="piece.js" charset="utf-8"></script>
		<script src="main.js" charset="utf-8"></script>
		<style>
			body {
				font-family: "Lato", sans-serif;
				background-color: #cdd;
				color: black;
			}

			.pieces-table {
				background-color: #dfd;
				margin-left: 22px;
				margin-bottom: 12px;
				margin-top: 4px;
				padding: 4px;
			}

			.pieces-table td {
				height: 16px;
				width: 16px;
				border-radius: 4px;
			}

			button {
				cursor: pointer;
				background-color: #4d0;
				border-radius: 6px;
				width: 100px;
				margin-left: 6px;
				margin-right: 6px;
			}

			button:hover {
				font-weight: bold;
			}

			#n-field {
				width: 40px;
			}

			.pieces-header {
				background-color: #4d0;
				padding: 4px;
				font-weight: bold;
			}

			#spinner {
				height: 36px;
			}

			.hidden {
				display: none;
			}

			canvas {
				border-width: 8px;
				border-color: #fff;
				border-style: inset;
				border-radius: 4px;
				background-color: #222;
				vertical-align: top;
				margin: 22px;
			}

			#title {
				font-size: 28px;
			}

			#game-container {}

		</style>
	</head>

	<body onLoad="onLoad();" onKeyDown="onKeyDown(event);" onKeyUp="onKeyUp(event);">
		<div id="title">
			n-tris
			<hr />
		</div>
		<div id="game-container" class="hidden">
			<canvas id="game-canvas"></canvas>
			<canvas id="info-canvas" width="200" height="400"></canvas>
		</div>

		<!--
		Enter n: <input id="n-field" type="text" value="4" />

		<button id="go-button" onClick="generatePiecesTable()">Go</button>
		<span id="spinner" class="hidden">WORKING...</span>
		<hr />
		<div id="pieces-table-container"> </div> -->
	</body>

</html>
